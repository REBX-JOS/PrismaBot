; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; ================================================================
; AI Thinker ESP32-CAM — PlatformIO build (espressif32 6.x / arduino-esp32 3.x)
; ================================================================
;
; QUICK START
; 1. Copy myconfig.sample.h to myconfig.h and set your WiFi credentials and camera model.
; 2. Select your board in the [env:esp32cam] section if not using AI Thinker.
; 3. Click "Build" in VSCode PlatformIO, then "Upload".
; 4. Open Serial Monitor at 115200 baud and note the IP address.
; 5. Visit http://<IP>/ to access the camera web UI.
;
; For OTA updates, see upload_protocol / upload_port settings below.
; ================================================================

[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino

; Partition scheme: minimal SPIFFS leaves enough flash for the app plus
; persistent preference storage used by this sketch.
board_build.partitions = min_spiffs.csv

; Build flags:
;   -DBOARD_HAS_PSRAM          enables PSRAM for high-resolution capture
;   -DCAMERA_MODEL_AI_THINKER  selects AI Thinker pin definitions from camera_pins.h
;   -I${PROJECT_DIR}           adds project root to include path (for myconfig.h)
build_flags =
    -DBOARD_HAS_PSRAM
    -DCAMERA_MODEL_AI_THINKER
    -I${PROJECT_DIR}

monitor_speed = 115200

; ----------------------------------------------------------------
; OTA upload — uncomment and fill in to use Over-The-Air updates
; ----------------------------------------------------------------
; upload_protocol = espota
; upload_port     = <IP address or mDNS hostname>
; upload_flags    =
;     --auth=<OTA_PASSWORD>
