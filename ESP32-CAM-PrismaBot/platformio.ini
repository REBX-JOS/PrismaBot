; PlatformIO Project Configuration File
;
; PrismaBot — ESP32-CAM Q-Learning visual navigation
;
; https://docs.platformio.org/page/projectconf.html

[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino

; Partition scheme with enough space for camera + Q-table code
board_build.partitions = huge_app.csv

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM

; Upload / monitor settings (adjust port as needed)
monitor_speed = 115200

; External libraries
lib_deps =
    olikraus/U8g2@^2.35.7
